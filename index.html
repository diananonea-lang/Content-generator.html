<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saturday Dump — diananonea</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
    --border: #2a2a2a; --border2: #333; --text: #e8e4dc;
    --muted: #666; --muted2: #888; --purple: #a89cf7;
    --teal: #5ecfb0; --amber: #f0b55a; --coral: #f07a5a;
    --mono: 'DM Mono', monospace; --sans: 'DM Sans', sans-serif;
  }
  html { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.6; }
  body { max-width: 720px; margin: 0 auto; padding: 40px 24px 80px; }
  header { margin-bottom: 48px; }
  .header-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 26px; font-weight: 300; color: var(--text); letter-spacing: -.02em; line-height: 1.2; }
  h1 span { color: var(--purple); }
  .header-sub { font-size: 13px; color: var(--muted2); margin-top: 8px; }
  .section { margin-bottom: 28px; }
  .section-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  textarea, input[type="text"], input[type="password"] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 14px;
    line-height: 1.6; padding: 12px 16px; outline: none; transition: border-color .2s;
  }
  textarea { resize: vertical; min-height: 90px; }
  textarea:focus, input:focus { border-color: var(--purple); }
  textarea::placeholder, input::placeholder { color: var(--muted); }
  .toggle-row { display: flex; align-items: center; gap: 12px; }
  .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: var(--border2); border-radius: 10px; cursor: pointer; transition: background .2s; }
  .toggle input:checked + .toggle-track { background: var(--purple); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform .2s; pointer-events: none; }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }
  .toggle-label { font-size: 13px; color: var(--muted2); }
  .collab-detail { margin-top: 10px; display: none; }
  .collab-detail.visible { display: block; }
  .generate-btn {
    width: 100%; padding: 14px; background: #2d2840; border: 1px solid var(--purple);
    border-radius: 8px; color: var(--purple); font-family: var(--mono); font-size: 13px;
    letter-spacing: .06em; cursor: pointer; transition: background .2s;
  }
  .generate-btn:hover { background: #3a3060; }
  .generate-btn:disabled { opacity: .4; cursor: not-allowed; }
  .output-area { margin-top: 40px; display: none; }
  .output-area.visible { display: block; }
  .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 16px; overflow: hidden; }
  .video-card-header { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
  .video-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .video-type { font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; }
  .video-format { font-size: 11px; color: var(--muted); margin-left: auto; font-family: var(--mono); }
  .video-card-body { padding: 16px; }
  .field-label { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
  .field-label:first-child { margin-top: 0; }
  .screen-text { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 10px 14px; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .tips-list { list-style: none; }
  .tips-list li { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--muted2); display: flex; gap: 8px; }
  .tips-list li:last-child { border-bottom: none; }
  .tips-list li::before { content: '·'; color: var(--purple); flex-shrink: 0; }
  .caption-text { font-size: 13px; color: var(--muted2); line-height: 1.65; white-space: pre-wrap; }
  .copy-btn { margin-top: 10px; padding: 7px 14px; background: transparent; border: 1px solid var(--border2); border-radius: 6px; color: var(--muted2); font-family: var(--mono); font-size: 11px; letter-spacing: .06em; cursor: pointer; transition: border-color .2s, color .2s; }
  .copy-btn:hover { border-color: var(--purple); color: var(--purple); }
  .copy-btn.copied { color: var(--teal); border-color: var(--teal); }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--mono); font-size: 12px; letter-spacing: .08em; }
  .loading-dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: .2s; }
  .loading-dot:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  .error { color: var(--coral); font-size: 13px; padding: 12px 16px; background: #2e1810; border-radius: 8px; margin-top: 12px; }
  .week-badge { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 4px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); margin-bottom: 24px; }
</style>
</head>
<body>
 
<header>
  <div class="header-label">diananonea · content system</div>
  <h1>Saturday<br><span>content dump</span></h1>
  <div class="header-sub">Tell me what happened this week. I'll give you 3 ready-to-publish scripts.</div>
</header>
 
<div id="week-badge" class="week-badge"></div>
 
<div class="section">
  <div class="section-label">what happened with marnee this week</div>
  <textarea id="marnee-dump" placeholder="What did you build, break, discover, or struggle with? First client feedback? Grant progress? Even if it was a slow week — what did you think about?" rows="4"></textarea>
</div>
 
<div class="section">
  <div class="section-label">your life in korea this week</div>
  <textarea id="korea-dump" placeholder="Anything interesting, surprising, or annoying about living here? A café you worked from? Something that happened with Caleb or a friend?" rows="3"></textarea>
</div>
 
<div class="section">
  <div class="section-label">how was your energy this week</div>
  <textarea id="energy-dump" placeholder="High energy and building? Slow week, TDAH hitting hard? SPM? Stressed about grants?" rows="2"></textarea>
</div>
 
<div class="section">
  <div class="section-label">collab this week</div>
  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="collab-toggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
    <span class="toggle-label">I have a collab this week</span>
  </div>
  <div class="collab-detail" id="collab-detail">
    <textarea id="collab-dump" placeholder="Brand, product, experience — what is it and what did you do?" rows="2" style="margin-top:10px;"></textarea>
  </div>
</div>
 
<button class="generate-btn" id="gen-btn" onclick="generate()">generate this week's content →</button>
 
<div class="output-area" id="output"></div>
 
<script>
document.getElementById('week-badge').textContent = new Date().toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
 
document.getElementById('collab-toggle').addEventListener('change', function() {
  document.getElementById('collab-detail').classList.toggle('visible', this.checked);
});
 
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}
 
function videoCard(type, color, format, fields) {
  const fieldHtml = fields.map(f => `
    <div class="field-label">${f.label}</div>
    ${f.type === 'screen' ? `<div class="screen-text">${f.content}</div>` : ''}
    ${f.type === 'tips' ? `<ul class="tips-list">${f.content.map(t => `<li>${t}</li>`).join('')}</ul>` : ''}
    ${f.type === 'text' ? `<div class="caption-text">${f.content}</div>` : ''}
    <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(f.copyText || f.content)})">copy</button>
  `).join('');
  return `
    <div class="video-card">
      <div class="video-card-header">
        <div class="video-dot" style="background:${color}"></div>
        <div class="video-type" style="color:${color}">${type}</div>
        <div class="video-format">${format}</div>
      </div>
      <div class="video-card-body">${fieldHtml}</div>
    </div>`;
}
 
async function generate() {
  const marnee = document.getElementById('marnee-dump').value.trim();
  const korea = document.getElementById('korea-dump').value.trim();
  const energy = document.getElementById('energy-dump').value.trim();
  const hasCollab = document.getElementById('collab-toggle').checked;
  const collab = document.getElementById('collab-dump').value.trim();
 
  if (!marnee && !korea) {
    document.getElementById('output').innerHTML = '<div class="error">Fill in at least one field.</div>';
    document.getElementById('output').classList.add('visible');
    return;
  }
 
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'generating...';
 
  const output = document.getElementById('output');
  output.classList.add('visible');
  output.innerHTML = '<div class="loading"><span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span> building your week</div>';
 
  try {
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ marnee, korea, energy, hasCollab, collab })
    });
 
    const parsed = await response.json();
    if (parsed.error) throw new Error(parsed.error);
 
    let html = '<div class="section-label" style="margin-bottom:20px;">this week\'s scripts · ready to use</div>';
 
    html += videoCard('curiosities #1', '#a89cf7', '5–15 sec · café footage + text overlay', [
      { label: 'text overlay', type: 'screen', content: parsed.video1.screen_text },
      { label: 'tips for caption', type: 'tips', content: parsed.video1.tips, copyText: parsed.video1.tips.map(t=>`• ${t}`).join('\n') },
      { label: 'full caption', type: 'text', content: parsed.video1.caption, copyText: parsed.video1.caption }
    ]);
 
    html += videoCard('curiosities #2', '#a89cf7', '5–15 sec · café footage + text overlay', [
      { label: 'text overlay', type: 'screen', content: parsed.video2.screen_text },
      { label: 'tips for caption', type: 'tips', content: parsed.video2.tips, copyText: parsed.video2.tips.map(t=>`• ${t}`).join('\n') },
      { label: 'full caption', type: 'text', content: parsed.video2.caption, copyText: parsed.video2.caption }
    ]);
 
    html += videoCard('emotional storytelling', '#5ecfb0', '30–90 sec · voice-over or text', [
      { label: 'text overlay hook', type: 'screen', content: parsed.video3.screen_text },
      { label: 'voice-over script', type: 'text', content: parsed.video3.voiceover, copyText: parsed.video3.voiceover },
      { label: 'full caption', type: 'text', content: parsed.video3.caption, copyText: parsed.video3.caption }
    ]);
 
    if (parsed.collab) {
      html += videoCard('collab storytelling', '#f0b55a', 'storytelling format', [
        { label: 'text overlay hook', type: 'screen', content: parsed.collab.screen_text },
        { label: 'voice-over script', type: 'text', content: parsed.collab.voiceover, copyText: parsed.collab.voiceover },
        { label: 'full caption', type: 'text', content: parsed.collab.caption, copyText: parsed.collab.caption }
      ]);
    }
 
    output.innerHTML = html;
  } catch (err) {
    output.innerHTML = `<div class="error">${err.message || 'Something went wrong. Try again.'}</div>`;
  }
 
  btn.disabled = false;
  btn.textContent = 'generate this week\'s content →';
}
</script>
</body>
</html>
